<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Aula de arrow function e setInterval-->
    <div id="caixa"></div>
    <style>
        body{
            background-color: black;
        }
        #caixa{
            width:50px;
            height:50px;
            background-color: brown;
            position: absolute;
            left: 0px;
            top: 0px;
        }
    </style>
    <script>
    let caixa = document.getElementById("caixa");
    let posicao = 0;
    setInterval(()=>{
    posicao = posicao +=5;
    caixa.style.left = posicao+ "px"
    },100);

</script>
</body>
</html>
